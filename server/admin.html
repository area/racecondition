<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpaceTeam Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #0d1c0c;
            --surface:    #132211;
            --trace:      #1e3a1a;
            --silk:       #c8e6b4;
            --silk-mid:   rgba(200, 230, 180, 0.68);
            --silk-dim:   rgba(200, 230, 180, 0.38);
            --copper:     #c8793a;
            --copper-bg:  rgba(200, 121, 58, 0.1);
            --led-green:  #22c55e;
            --led-amber:  #f59e0b;
            --led-blue:   #60a5fa;
            --ok:         #22c55e;
            --bad:        #ef4444;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--silk);
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            background-color: var(--bg);
            background-image:
                radial-gradient(circle, rgba(30, 58, 26, 0.85) 1px, transparent 1px),
                radial-gradient(circle, rgba(30, 58, 26, 0.85) 1px, transparent 1px);
            background-size: 24px 42px;
            background-position: 0 0, 12px 21px;
        }
        header {
            padding: 20px 24px 8px;
            border-bottom: 1px solid var(--trace);
        }
        h1 {
            margin: 0;
            font-family: "Space Mono", monospace;
            letter-spacing: 0.1em;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            color: var(--copper);
        }
        .sub {
            color: var(--silk-dim);
            margin-top: 4px;
            font-size: 12px;
            font-family: "IBM Plex Mono", monospace;
            letter-spacing: 0.04em;
        }
        main {
            display: grid;
            gap: 16px;
            padding: 16px 24px 28px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 360px));
        }
        .no-rooms {
            grid-column: 1 / -1;
            text-align: center;
            padding: 64px 24px;
            color: var(--silk-dim);
        }
        .no-rooms .no-rooms-icon {
            font-size: 48px;
            line-height: 1;
            margin-bottom: 12px;
        }
        .no-rooms p {
            margin: 4px 0;
            font-size: 15px;
        }
        .no-rooms .hint {
            font-size: 13px;
            margin-top: 8px;
            font-family: "IBM Plex Mono", monospace;
        }
        .room {
            background: var(--surface);
            border: 1px solid var(--trace);
            border-radius: 4px;
            padding: 14px;
        }
        .room.room-enter {
            transform: translateY(8px);
            opacity: 0;
            animation: rise 360ms ease forwards;
        }
        .room h2 {
            margin: 0 0 10px;
            font-size: 14px;
            font-family: "Space Mono", monospace;
            font-weight: 700;
            color: var(--silk);
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--silk-mid);
        }
        .scores {
            margin: 10px 0;
            padding: 8px;
            border-radius: 3px;
            border: 1px solid var(--trace);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-family: "Space Mono", monospace;
            font-size: 13px;
            font-weight: 700;
        }
        .ok { color: var(--ok); }
        .bad { color: var(--bad); }
        ul {
            margin: 8px 0 0;
            padding-left: 16px;
            font-size: 13px;
            color: var(--silk-mid);
        }
        li { margin-bottom: 4px; }
        .muted { color: var(--silk-dim); }
        .badge {
            display: inline-block;
            border: 1px solid rgba(200, 121, 58, 0.28);
            border-radius: 2px;
            padding: 1px 6px;
            margin-left: 6px;
            font-size: 10px;
            font-family: "IBM Plex Mono", monospace;
            color: var(--copper);
            background: rgba(200, 121, 58, 0.08);
        }
        .footer {
            padding: 4px 24px 20px;
            font-size: 11px;
            color: var(--silk-dim);
            font-family: "IBM Plex Mono", monospace;
            letter-spacing: 0.04em;
        }
        .state-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            border-radius: 2px;
            padding: 2px 7px;
            font-size: 9px;
            font-weight: 700;
            font-family: "IBM Plex Mono", monospace;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            vertical-align: middle;
        }
        .state-badge::before {
            content: '';
            display: inline-block;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .state-waiting  { background: rgba(245, 158, 11, 0.1); color: var(--led-amber); border: 1px solid rgba(245, 158, 11, 0.25); }
        .state-waiting::before  { background: var(--led-amber); }
        .state-in-round { background: rgba(34, 197, 94, 0.1); color: var(--led-green); border: 1px solid rgba(34, 197, 94, 0.25); }
        .state-in-round::before { background: var(--led-green); box-shadow: 0 0 4px var(--led-green); }
        .state-finished { background: rgba(96, 165, 250, 0.1); color: var(--led-blue); border: 1px solid rgba(96, 165, 250, 0.25); }
        .state-finished::before { background: var(--led-blue); }
        .hurry-btn {
            margin-top: 10px;
            width: 100%;
            padding: 7px 0;
            border: 1px solid var(--led-amber);
            border-radius: 3px;
            background: rgba(245, 158, 11, 0.1);
            color: var(--led-amber);
            font-family: "Space Mono", monospace;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.12s;
        }
        .hurry-btn:hover { background: rgba(245, 158, 11, 0.18); }
        .hurry-btn:active { background: rgba(245, 158, 11, 0.25); }
        @keyframes rise {
            to { transform: translateY(0); opacity: 1; }
        }

        /* ── Games table ── */
        .games-section {
            padding: 0 24px 32px;
            border-top: 1px solid var(--trace);
        }
        .games-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin: 20px 0 14px;
        }
        .games-header h2 {
            margin: 0;
            font-family: "Space Mono", monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--copper);
        }
        .games-count {
            font-size: 12px;
            color: var(--silk-dim);
            font-family: "IBM Plex Mono", monospace;
        }
        .games-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .games-table thead tr {
            border-bottom: 1px solid var(--copper);
        }
        .games-table th {
            text-align: left;
            padding: 7px 10px;
            font-size: 10px;
            font-weight: 700;
            font-family: "IBM Plex Mono", monospace;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--copper);
        }
        .games-table th.r { text-align: right; }
        .games-table tbody tr.summary-row {
            border-bottom: 1px solid var(--trace);
            cursor: pointer;
            transition: background 0.1s;
        }
        .games-table tbody tr.summary-row:hover { background: rgba(200, 230, 180, 0.03); }
        .games-table tbody tr.summary-row.open { background: rgba(200, 121, 58, 0.05); }
        .games-table td {
            padding: 9px 10px;
            vertical-align: middle;
            color: var(--silk-mid);
        }
        .games-table td.r { text-align: right; }
        .expand-icon {
            display: inline-block;
            width: 16px;
            color: var(--copper);
            font-size: 10px;
            transition: transform 0.18s;
        }
        .summary-row.open .expand-icon { transform: rotate(90deg); }
        .score-val {
            font-family: "Space Mono", monospace;
            font-weight: 700;
            color: var(--copper);
        }
        .pass-val { color: var(--ok); font-weight: 600; }
        .fail-val { color: var(--bad); font-weight: 600; }
        .ts-val { font-size: 11px; color: var(--silk-dim); white-space: nowrap; font-family: "IBM Plex Mono", monospace; }
        .detail-row td {
            padding: 0;
            border-bottom: 1px solid var(--trace);
        }
        .detail-inner {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.22s ease;
        }
        .detail-body {
            padding: 10px 14px 14px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .badge-card {
            background: var(--bg);
            border: 1px solid var(--trace);
            border-radius: 3px;
            padding: 8px 12px;
            min-width: 160px;
        }
        .badge-card-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 5px;
            color: var(--silk);
        }
        .mod-chip {
            display: inline-block;
            background: rgba(200, 121, 58, 0.08);
            border: 1px solid rgba(200, 121, 58, 0.22);
            border-radius: 2px;
            padding: 2px 6px;
            font-size: 10px;
            font-family: "IBM Plex Mono", monospace;
            color: var(--copper);
            margin: 2px 2px 0 0;
        }
        .games-empty {
            text-align: center;
            padding: 40px 0;
            color: var(--silk-dim);
            font-size: 13px;
        }
        .badge-card-stats {
            margin-top: 5px;
            font-size: 11px;
            display: flex;
            gap: 8px;
            font-family: "IBM Plex Mono", monospace;
        }
        .detail-inner.open { max-height: 900px; }
        .mod-results {
            padding: 4px 14px 10px 30px;
            border-top: 1px solid var(--trace);
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }
        .mod-results-label {
            font-size: 10px;
            color: var(--silk-dim);
            margin-right: 2px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-family: "IBM Plex Mono", monospace;
        }
        .mod-result-chip {
            background: rgba(200, 230, 180, 0.04);
            border: 1px solid var(--trace);
            border-radius: 2px;
            padding: 2px 7px;
            font-family: "IBM Plex Mono", monospace;
            font-size: 11px;
            color: var(--silk-mid);
        }
        .pager {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .pager-info {
            font-size: 11px;
            color: var(--silk-dim);
            font-family: "IBM Plex Mono", monospace;
        }
        .pager-btn {
            border: 1px solid var(--trace);
            background: var(--surface);
            border-radius: 2px;
            padding: 3px 10px;
            cursor: pointer;
            font-size: 11px;
            font-family: "IBM Plex Mono", monospace;
            color: var(--silk-mid);
            transition: background 0.1s;
        }
        .pager-btn:disabled { opacity: 0.3; cursor: default; }
        .pager-btn:not(:disabled):hover { background: rgba(200, 230, 180, 0.05); color: var(--silk); }
    </style>
</head>
<body>
    <header>
        <h1>SpaceTeam Admin</h1>
        <div class="sub">live room state · badges · assignments · scores</div>
    </header>
    <main id="rooms">
        <div class="no-rooms" id="no-rooms">
            <div class="no-rooms-icon">🚀</div>
            <p><strong>No rooms open</strong></p>
            <p class="hint">Create a room from a badge to get started</p>
        </div>
    </main>
    <div class="games-section">
        <div class="games-header">
            <h2>Games</h2>
            <span class="games-count" id="games-count"></span>
            <div class="pager">
                <button class="pager-btn" id="pager-prev" disabled>&#8592; Prev</button>
                <span class="pager-info" id="pager-info"></span>
                <button class="pager-btn" id="pager-next" disabled>Next &#8594;</button>
            </div>
        </div>
        <table class="games-table">
            <thead>
                <tr>
                    <th></th>
                    <th>Time</th>
                    <th>Room</th>
                    <th class="r">Score</th>
                    <th class="r">Badges</th>
                    <th class="r">Passed</th>
                    <th class="r">Failed</th>
                    <th class="r">Hexpansions</th>
                </tr>
            </thead>
            <tbody id="games-tbody">
                <tr><td colspan="8" class="games-empty">Loading…</td></tr>
            </tbody>
        </table>
    </div>
    <div class="footer" id="updated">Waiting for data...</div>

    <script>
        const roomsEl = document.getElementById("rooms");
        const updatedEl = document.getElementById("updated");
        const noRoomsEl = document.getElementById("no-rooms");
        const roomNodes = new Map();

        function esc(v) {
            return String(v)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        async function hurry(roomId) {
            await fetch(`/api/rooms/${roomId}/hurry`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
        }

        function roomCard(room, usernames) {
            const badges = room.badges || [];
            const assignments = room.assignments || [];
            const state = room.room_state || "waiting";
            const stateLabel = { waiting: "Waiting", "in-round": "In Round", finished: "Finished" }[state] || state;
            const stateClass = { waiting: "state-waiting", "in-round": "state-in-round", finished: "state-finished" }[state] || "";

            const name = (bid) => esc((usernames && usernames[bid]) || bid);
            const colourDot = (c) => c ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${esc(c)};margin-right:4px;vertical-align:middle;box-shadow:0 0 4px ${esc(c)}40"></span>` : '';
            const badgeList = badges.length
                ? badges.map((b) => `<li>${colourDot(b.colour)}<strong>${name(b.badge_id)}</strong> <span class="badge">${esc(b.colour || '?')}</span> <span class="muted">${b.module_count} modules</span></li>`).join("")
                : '<li class="muted">No active badges</li>';

            const assignmentList = assignments.length
                ? assignments.map((a) => `<li>${colourDot(a.target_colour)}<strong>${esc(a.target_colour ? a.target_colour.charAt(0).toUpperCase() + a.target_colour.slice(1) + ': ' : '')}${esc(a.command)}</strong> on ${esc(a.module)} <span class="muted">${name(a.target_badge_id)}</span></li>`).join("")
                : '<li class="muted">No active assignments</li>';

            const hurryBtn = state === "in-round"
                ? `<button class="hurry-btn" onclick="hurry(${room.room_id})">⏱ Set timer to 5s</button>`
                : "";

            return `
                <section class="room">
                    <h2>Room ${room.room_id} <span class="state-badge ${stateClass}">${stateLabel}</span></h2>
                    <div class="row"><span>Badges</span><strong>${room.badge_count}</strong></div>
                    <div class="row"><span>Assignments</span><strong>${assignments.length}</strong></div>
                    <div class="scores">
                        <div class="ok">Pass: ${room.scores.passed}</div>
                        <div class="bad">Fail: ${room.scores.failed}</div>
                    </div>
                    <div><strong>Badges</strong></div>
                    <ul>${badgeList}</ul>
                    <div><strong>Assignments</strong></div>
                    <ul>${assignmentList}</ul>
                    ${hurryBtn}
                </section>
            `;
        }

        function createRoomNode(room, usernames) {
            const wrapper = document.createElement("div");
            wrapper.innerHTML = roomCard(room, usernames).trim();
            const section = wrapper.firstElementChild;
            section.classList.add("room-enter");
            section.addEventListener(
                "animationend",
                () => {
                    section.classList.remove("room-enter");
                },
                { once: true }
            );
            return section;
        }

        function updateRooms(rooms, usernames) {
            const seen = new Set();

            for (const room of rooms) {
                const key = String(room.room_id);
                seen.add(key);
                const existing = roomNodes.get(key);
                if (!existing) {
                    const node = createRoomNode(room, usernames);
                    roomNodes.set(key, node);
                    roomsEl.appendChild(node);
                    continue;
                }

                const wrapper = document.createElement("div");
                wrapper.innerHTML = roomCard(room, usernames).trim();
                const next = wrapper.firstElementChild;
                existing.innerHTML = next.innerHTML;
            }

            for (const [key, node] of roomNodes.entries()) {
                if (!seen.has(key)) {
                    node.remove();
                    roomNodes.delete(key);
                }
            }

            noRoomsEl.style.display = roomNodes.size === 0 ? "" : "none";
        }

        async function refresh() {
            try {
                const response = await fetch('/api/admin/status');
                const data = await response.json();
                updateRooms(data.rooms || [], data.usernames || {});
                updatedEl.textContent = `Updated: ${new Date().toLocaleTimeString()} | Active badges: ${data.total_badges}`;
            } catch (err) {
                updatedEl.textContent = `Admin fetch failed: ${err}`;
            }
        }

        refresh();
        setInterval(refresh, 1000);

        // ── Games table ──────────────────────────────────────────

        const gamesTbody = document.getElementById("games-tbody");
        const gamesCount = document.getElementById("games-count");
        const pagerPrev = document.getElementById("pager-prev");
        const pagerNext = document.getElementById("pager-next");
        const pagerInfo = document.getElementById("pager-info");

        const PAGE_SIZE = 10;
        let currentPage = 0;
        let allEntries = [];
        let allUsernames = {};
        const openRows = new Set();

        function relTime(iso) {
            const m = Math.floor((Date.now() - new Date(iso)) / 60000);
            if (m < 1) return "just now";
            if (m < 60) return `${m}m ago`;
            const h = Math.floor(m / 60);
            if (h < 24) return `${h}h ago`;
            return `${Math.floor(h / 24)}d ago`;
        }

        function badgeCards(entry, usernames) {
            const badges = entry.badges || {};
            const bscores = entry.badge_scores || {};
            return Object.entries(badges).map(([id, mods]) => {
                const name = (usernames && usernames[id]) ? esc(usernames[id]) : `<span style="font-family:monospace;font-size:11px;opacity:.6">…${esc(id.slice(-6))}</span>`;
                const chips = mods.map(m => `<span class="mod-chip">${esc(m)}</span>`).join("");
                const sc = bscores[id];
                const stats = sc != null
                    ? `<div class="badge-card-stats"><span class="pass-val">✓ ${sc.passed}</span><span class="fail-val">✗ ${sc.failed}</span></div>`
                    : "";
                return `<div class="badge-card"><div class="badge-card-name">${name}</div>${chips || '<span style="opacity:.4;font-size:11px">no modules</span>'}${stats}</div>`;
            }).join("");
        }

        function moduleResultsSection(entry) {
            const mr = entry.module_results || {};
            const items = Object.entries(mr);
            if (!items.length) return "";
            const chips = items.map(([mod, sc]) =>
                `<span class="mod-result-chip">${esc(mod)}&ensp;<span class="pass-val">✓${sc.passed}</span>&nbsp;<span class="fail-val">✗${sc.failed}</span></span>`
            ).join("");
            return `<div class="mod-results"><span class="mod-results-label">by module:</span>${chips}</div>`;
        }

        function renderPage() {
            if (!allEntries.length) {
                gamesTbody.innerHTML = '<tr><td colspan="8" class="games-empty">No games yet</td></tr>';
                gamesCount.textContent = "";
                pagerInfo.textContent = "";
                pagerPrev.disabled = true;
                pagerNext.disabled = true;
                return;
            }

            const total = allEntries.length;
            const totalPages = Math.ceil(total / PAGE_SIZE);
            currentPage = Math.max(0, Math.min(currentPage, totalPages - 1));
            const start = currentPage * PAGE_SIZE;
            const end = Math.min(start + PAGE_SIZE, total);
            const page = allEntries.slice(start, end);

            gamesCount.textContent = `${total} game${total !== 1 ? "s" : ""}`;
            pagerInfo.textContent = totalPages > 1 ? `${start + 1}–${end} of ${total}` : "";
            pagerPrev.disabled = currentPage === 0;
            pagerNext.disabled = currentPage >= totalPages - 1;

            const rows = page.map((e, i) => {
                const id = `game-${start + i}`;
                return `
                    <tr class="summary-row" data-detail="${id}" data-idx="${start + i}">
                        <td><span class="expand-icon">▶</span></td>
                        <td><span class="ts-val" data-ts="${esc(e.timestamp)}">${relTime(e.timestamp)}</span></td>
                        <td>${e.room_id}</td>
                        <td class="r score-val">${e.score.toFixed(2)}</td>
                        <td class="r">${e.num_badges}</td>
                        <td class="r pass-val">${e.commands_passed}</td>
                        <td class="r fail-val">${e.commands_failed}</td>
                        <td class="r">${e.total_modules}</td>
                    </tr>
                    <tr class="detail-row">
                        <td colspan="8"><div class="detail-inner" id="${id}">
                            <div class="detail-body">${badgeCards(e, allUsernames)}</div>
                            ${moduleResultsSection(e)}
                        </div></td>
                    </tr>`;
            }).join("");
            gamesTbody.innerHTML = rows;

            gamesTbody.querySelectorAll(".summary-row").forEach(row => {
                const idx = Number(row.dataset.idx);
                if (openRows.has(idx)) {
                    row.classList.add("open");
                    document.getElementById(row.dataset.detail).classList.add("open");
                }
                row.addEventListener("click", () => {
                    const inner = document.getElementById(row.dataset.detail);
                    const isOpen = inner.classList.contains("open");
                    inner.classList.toggle("open", !isOpen);
                    row.classList.toggle("open", !isOpen);
                    if (isOpen) openRows.delete(idx); else openRows.add(idx);
                });
            });
        }

        pagerPrev.addEventListener("click", () => { currentPage--; renderPage(); });
        pagerNext.addEventListener("click", () => { currentPage++; renderPage(); });

        async function refreshGames() {
            try {
                const data = await fetch("/api/leaderboard").then(r => r.json());
                allEntries = data.leaderboard || [];
                allUsernames = data.usernames || {};
                renderPage();
            } catch {}
        }

        refreshGames();
        setInterval(refreshGames, 15000);
        setInterval(() => {
            gamesTbody.querySelectorAll(".ts-val[data-ts]").forEach(el => {
                el.textContent = relTime(el.dataset.ts);
            });
        }, 30000);
    </script>
</body>
</html>
