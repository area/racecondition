<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SpaceTeam Admin</title>
    <style>
        :root {
            --bg: #f4efe3;
            --panel: #fff9ec;
            --line: #d7c9aa;
            --text: #2c2314;
            --accent: #0f766e;
            --accent-2: #b45309;
            --ok: #166534;
            --bad: #991b1b;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            color: var(--text);
            font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 10%, rgba(180, 83, 9, 0.1), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(15, 118, 110, 0.12), transparent 42%),
                var(--bg);
        }
        header {
            padding: 20px 24px 8px;
        }
        h1 {
            margin: 0;
            font-family: "Space Grotesk", "Avenir Next", sans-serif;
            letter-spacing: 0.02em;
            font-weight: 700;
            font-size: 30px;
        }
        .sub {
            opacity: 0.8;
            margin-top: 6px;
            font-size: 14px;
        }
        main {
            display: grid;
            gap: 16px;
            padding: 16px 24px 28px;
            grid-template-columns: repeat(auto-fill, minmax(280px, 360px));
        }
        .no-rooms {
            grid-column: 1 / -1;
            text-align: center;
            padding: 64px 24px;
            opacity: 0.55;
        }
        .no-rooms .no-rooms-icon {
            font-size: 48px;
            line-height: 1;
            margin-bottom: 12px;
        }
        .no-rooms p {
            margin: 4px 0;
            font-size: 15px;
        }
        .no-rooms .hint {
            font-size: 13px;
            margin-top: 8px;
        }
        .room {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 8px 18px rgba(44, 35, 20, 0.06);
        }
        .room.room-enter {
            transform: translateY(8px);
            opacity: 0;
            animation: rise 360ms ease forwards;
        }
        .room h2 {
            margin: 0 0 10px;
            font-size: 20px;
            font-family: "Space Grotesk", "Avenir Next", sans-serif;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .scores {
            margin: 10px 0;
            padding: 8px;
            border-radius: 10px;
            border: 1px dashed var(--line);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-weight: 600;
        }
        .ok { color: var(--ok); }
        .bad { color: var(--bad); }
        ul {
            margin: 8px 0 0;
            padding-left: 16px;
            font-size: 13px;
        }
        li { margin-bottom: 4px; }
        .muted { opacity: 0.7; }
        .badge {
            display: inline-block;
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 2px 8px;
            margin-left: 6px;
            font-size: 12px;
            color: var(--accent);
            background: rgba(15, 118, 110, 0.08);
        }
        .footer {
            padding: 4px 24px 20px;
            font-size: 12px;
            opacity: 0.75;
        }
        .state-badge {
            display: inline-block;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }
        .state-waiting  { background: #fef3c7; color: #92400e; }
        .state-in-round { background: #dcfce7; color: #166534; }
        .state-finished { background: #e0e7ff; color: #3730a3; }
        .hurry-btn {
            margin-top: 10px;
            width: 100%;
            padding: 7px 0;
            border: none;
            border-radius: 8px;
            background: var(--accent-2);
            color: #fff;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            letter-spacing: 0.02em;
        }
        .hurry-btn:hover { opacity: 0.88; }
        .hurry-btn:active { opacity: 0.75; }
        @keyframes rise {
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>SpaceTeam Admin Console</h1>
        <div class="sub">Live room state, badges, assignments, and scores</div>
    </header>
    <main id="rooms">
        <div class="no-rooms" id="no-rooms">
            <div class="no-rooms-icon">🚀</div>
            <p><strong>No rooms open</strong></p>
            <p class="hint">Create a room from a badge to get started</p>
        </div>
    </main>
    <div class="footer" id="updated">Waiting for data...</div>

    <script>
        const roomsEl = document.getElementById("rooms");
        const updatedEl = document.getElementById("updated");
        const noRoomsEl = document.getElementById("no-rooms");
        const roomNodes = new Map();

        function esc(v) {
            return String(v)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        async function hurry(roomId) {
            await fetch(`/api/rooms/${roomId}/hurry`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
        }

        function roomCard(room, usernames) {
            const badges = room.badges || [];
            const assignments = room.assignments || [];
            const state = room.room_state || "waiting";
            const stateLabel = { waiting: "Waiting", "in-round": "In Round", finished: "Finished" }[state] || state;
            const stateClass = { waiting: "state-waiting", "in-round": "state-in-round", finished: "state-finished" }[state] || "";

            const name = (bid) => esc((usernames && usernames[bid]) || bid);
            const colourDot = (c) => c ? `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${esc(c)};margin-right:4px;vertical-align:middle"></span>` : '';
            const badgeList = badges.length
                ? badges.map((b) => `<li>${colourDot(b.colour)}<strong>${name(b.badge_id)}</strong> <span class="badge">${esc(b.colour || '?')}</span> <span class="muted">${b.module_count} modules</span></li>`).join("")
                : '<li class="muted">No active badges</li>';

            const assignmentList = assignments.length
                ? assignments.map((a) => `<li>${colourDot(a.target_colour)}<strong>${esc(a.target_colour ? a.target_colour.charAt(0).toUpperCase() + a.target_colour.slice(1) + ': ' : '')}${esc(a.command)}</strong> on ${esc(a.module)} <span class="muted">${name(a.target_badge_id)}</span></li>`).join("")
                : '<li class="muted">No active assignments</li>';

            const hurryBtn = state === "in-round"
                ? `<button class="hurry-btn" onclick="hurry(${room.room_id})">⏱ Set timer to 5s</button>`
                : "";

            return `
                <section class="room">
                    <h2>Room ${room.room_id} <span class="state-badge ${stateClass}">${stateLabel}</span></h2>
                    <div class="row"><span>Badges</span><strong>${room.badge_count}</strong></div>
                    <div class="row"><span>Assignments</span><strong>${assignments.length}</strong></div>
                    <div class="scores">
                        <div class="ok">Pass: ${room.scores.passed}</div>
                        <div class="bad">Fail: ${room.scores.failed}</div>
                    </div>
                    <div><strong>Badges</strong></div>
                    <ul>${badgeList}</ul>
                    <div><strong>Assignments</strong></div>
                    <ul>${assignmentList}</ul>
                    ${hurryBtn}
                </section>
            `;
        }

        function createRoomNode(room, usernames) {
            const wrapper = document.createElement("div");
            wrapper.innerHTML = roomCard(room, usernames).trim();
            const section = wrapper.firstElementChild;
            section.classList.add("room-enter");
            section.addEventListener(
                "animationend",
                () => {
                    section.classList.remove("room-enter");
                },
                { once: true }
            );
            return section;
        }

        function updateRooms(rooms, usernames) {
            const seen = new Set();

            for (const room of rooms) {
                const key = String(room.room_id);
                seen.add(key);
                const existing = roomNodes.get(key);
                if (!existing) {
                    const node = createRoomNode(room, usernames);
                    roomNodes.set(key, node);
                    roomsEl.appendChild(node);
                    continue;
                }

                const wrapper = document.createElement("div");
                wrapper.innerHTML = roomCard(room, usernames).trim();
                const next = wrapper.firstElementChild;
                existing.innerHTML = next.innerHTML;
            }

            for (const [key, node] of roomNodes.entries()) {
                if (!seen.has(key)) {
                    node.remove();
                    roomNodes.delete(key);
                }
            }

            noRoomsEl.style.display = roomNodes.size === 0 ? "" : "none";
        }

        async function refresh() {
            try {
                const response = await fetch('/api/admin/status');
                const data = await response.json();
                updateRooms(data.rooms || [], data.usernames || {});
                updatedEl.textContent = `Updated: ${new Date().toLocaleTimeString()} | Active badges: ${data.total_badges}`;
            } catch (err) {
                updatedEl.textContent = `Admin fetch failed: ${err}`;
            }
        }

        refresh();
        setInterval(refresh, 1000);
    </script>
</body>
</html>
