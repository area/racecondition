name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest requests aiohttp
      - run: python -m pytest tests/server -q

  badge-test:
    name: Badge tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      # Badge-app suite lives in tests/badge/; its conftest stubs the
      # MicroPython/hardware modules, so no extra deps. Scoped to tests/badge
      # so this job stays free of the server's aiohttp/requests dependencies.
      - run: python -m pytest tests/badge -q

  deploy:
    # Gate the deploy on both suites — nothing ships unless everything is green.
    needs: [test, badge-test]
    # Tests run on every PR, but only a push to main actually deploys.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    # Single machine, single volume — never let two deploys race. Scoped to this
    # job so parallel PR test runs aren't serialized by the deploy lock.
    concurrency: deploy-server
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
